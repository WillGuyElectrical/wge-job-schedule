.quoteTitleCentered{
  position:relative;
  display:block!important;
  text-align:center!important;
  margin:20px 0 18px!important;
}
.quoteTitleCentered .quoteTitleMain{
  text-align:center!important;
  text-transform:uppercase;
}
.quoteSubCentered{
  color:#075d8d;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.5px;
  font-size:17px;
  line-height:1.35;
  margin-top:6px;
}
.quoteRefTop{
  position:absolute;
  right:0;
  top:4px;
  text-align:right;
  font-size:13px;
  color:#64748b;
  line-height:1.35;
}
.quoteMeta.projectOnly{
  display:block!important;
  text-align:center;
  padding:10px!important;
}
.quoteMeta.projectOnly div{
  background:#f8fafc;
  border-radius:14px;
  padding:13px!important;
}
.quoteMeta.projectOnly strong{
  font-size:17px!important;
}


.aiRewriteBox{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:10px;
  align-items:center;
  margin-top:10px;
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
}
.ramsRiskGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
  margin-top:14px;
}
@media(min-width:900px){
  .ramsRiskGrid{grid-template-columns:1fr 1fr;}
}
.checkCard{
  display:flex;
  gap:8px;
  align-items:center;
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  color:var(--text);
  font-size:14px;
}
.checkCard input{width:auto}
.ramsPreview{
  background:white;
  border:1px solid #d9e2ec;
  border-radius:22px;
  padding:30px;
  min-height:900px;
  position:relative;
  overflow:visible;
}
.ramsHeader{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  border-bottom:2px solid #dbe5ef;
  padding-bottom:16px;
  margin-bottom:18px;
}
.ramsHeader img{max-width:300px;height:auto}
.ramsTitle{
  text-align:right;
}
.ramsTitle h1{
  margin:0;
  font-size:30px;
  color:#0f172a;
}
.ramsBox{
  border:1px solid #dbe5ef;
  border-radius:14px;
  padding:12px;
  margin-top:12px;
  background:#fff;
}
.ramsBox h3{
  color:#075d8d;
  text-transform:uppercase;
  letter-spacing:.7px;
  font-size:13px;
  border-bottom:1px solid #e2e8f0;
  padding-bottom:6px;
}
.ramsTable th,.ramsTable td{font-size:13px}
@media print{
  body.print-rams section:not(#rams){display:none!important}
  body.print-rams #rams{display:block!important}
  .ramsPreview{border:0;box-shadow:none;border-radius:0}
}


.brandText{
  font-family:Arial Black, Arial, Helvetica, sans-serif;
  font-weight:900;
  letter-spacing:-0.6px;
  color:#0f172a;
  text-transform:none;
  white-space:nowrap;
}
.brandText .willGuy{
  font-size:17px;
}
.brandText .electrical{
  font-size:15px;
  letter-spacing:0.8px;
  text-transform:uppercase;
}
.quoteSideFade{
  left:18px!important;
  top:42px!important;
  font-family:Arial Black, Arial, Helvetica, sans-serif!important;
  font-size:42px!important;
  letter-spacing:1px!important;
  color:rgba(255,255,255,.115)!important;
  line-height:.95!important;
}

.quotePage>*{position:relative;z-index:1}

.quoteSideImage{
  padding:0!important;
  overflow:hidden!important;
  background:#1193d1!important;
  display:flex;
  align-items:stretch;
  justify-content:stretch;
}
.quoteSideFullImage{
  width:100%;
  height:100%;
  object-fit:fill;
  object-position:center top;
  display:block;
  background:#0897d5;
}
@media print{
  .quoteSideImage{
    min-height:281mm!important;
  }
  .quoteSideFullImage{
    height:281mm!important;
  }
}


/* FINAL SIDEBAR SCALE FIX */
.quoteSideImage{
  background:#0897d5!important;
  overflow:hidden!important;
}
.quoteSideFullImage{
  object-fit:fill!important;
  object-position:center top!important;
  background:#0897d5!important;
}
@media print{
  .quoteSideFullImage{
    object-fit:fill!important;
    height:281mm!important;
  }
}
.editableQuoteArea{
  min-height:220px;
  border:1px dashed #b8c7d8;
  border-radius:12px;
  padding:12px;
  background:#fff;
  outline:none;
  white-space:pre-line;
}
.editableQuoteArea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(15,127,183,.12);
}
.quoteEditHelp{
  background:#eef7fc;
  border:1px solid #c9e6f5;
  color:#075d8d;
  border-radius:14px;
  padding:10px;
  margin-top:10px;
  font-size:13px;
}
.scopeEditLarge textarea{

/* FORCE ASHCO BREAKDOWN INTO PRICE SECTION */
function injectAshcoSummaryIntoPriceBox(){
  try{
    if(typeof isAshcoQuote==="function" && !isAshcoQuote()) return;

    const t = ashcoBreakdownTotals ? ashcoBreakdownTotals() : null;
    if(!t) return;

    // find PRICE section by heading text
    const headings=[...document.querySelectorAll("div,h1,h2,h3,h4,strong")];
    const heading=headings.find(x=>String(x.textContent||"").trim()==="PRICE");
    if(!heading) return;

    // nearest bordered section/card
    let section=heading.parentElement;
    for(let i=0;i<4;i++){
      if(!section) break;
      const style=getComputedStyle(section);
      if(style.borderRadius!=="0px" || style.borderWidth!=="0px"){
        break;
      }
      section=section.parentElement;
    }

    if(!section) section=heading.parentElement;

    const existing=document.getElementById("ashcoPriceRowsInsidePriceBox");
    if(existing) existing.remove();

    const wrapper=document.createElement("div");
    wrapper.id="ashcoPriceRowsInsidePriceBox";
    wrapper.className="ashcoPriceRowsInsidePriceBox";

    wrapper.innerHTML=`
      <div style="font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin:12px 0 6px;color:#075985">
        Project Breakdown
      </div>

      <div class="priceLine">
        <span>Total Labour</span>
        <strong>${formatCurrency(t.labour || 0)}</strong>
      </div>

      <div class="priceLine">
        <span>Total Materials</span>
        <strong>${formatCurrency(t.materialsSell || 0)}</strong>
      </div>

      <div class="priceLine">
        <span>Total Lodge</span>

function normName(v){ return String(v||"").trim().toLowerCase(); }

function normaliseSiteContacts(site){
  if(!site) return [];
  if(!Array.isArray(site.contacts)) site.contacts = [];
  if((site.contactName || site.contactEmail) && !site.contacts.length){
    site.contacts.push({name:site.contactName||"", email:site.contactEmail||""});
  }
  return site.contacts;
}

function addOrUpdateDefaultCustomer(name, invoiceAddress, invoiceEmail, sites){
  let c = customers.find(x=>normName(x.name)===normName(name));
  if(!c){
    c = {id:wgeId(), name, invoiceAddress, invoiceEmail, notes:"Default WGE customer", sites:[]};
    customers.push(c);
  }else{
    c.invoiceAddress = invoiceAddress || c.invoiceAddress || "";
    c.invoiceEmail = invoiceEmail || c.invoiceEmail || c.email || "";
    if(!Array.isArray(c.sites)) c.sites = [];
  }
  sites.forEach(site=>{
    const siteName = typeof site === "string" ? site : site.name;
    const siteAddress = typeof site === "string" ? "" : (site.address||"");
    if(!siteName) return;
    let s = c.sites.find(x=>normName(x.name)===normName(siteName));
    if(!s){
      c.sites.push({id:wgeId(), name:siteName, address:siteAddress, contactName:"", contactEmail:"", contacts:[], notes:"Default WGE site"});
    }else if(siteAddress && !s.address){
      s.address = siteAddress;
    }
  });
}

function kensalMoney(v){ return "£"+Number(v||0).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function kensalRoundUp(v){ return Math.ceil(Number(v||0)); }

function kensalCalc(){
  const d=window.kensalSheetData, L=d.labour, C=d.cable;

  // EXACT spreadsheet links:
  // C19 = C6, C20 = C6, C21 = C8, C22 = C10, C25 = SUM(C19:C24)*2, C26 = C13/2, C27 = C21
  C.aux.runs = Number(L.motors.items||0);
  C.cy.runs = Number(L.motors.items||0);
  C.emStopCable.runs = Number(L.estop.items||0);
  C.interfaceCable.runs = Number(L.interface.items||0);
  C.stuffingGland.runs = (Number(C.aux.runs||0)+Number(C.cy.runs||0)+Number(C.emStopCable.runs||0)+Number(C.interfaceCable.runs||0)+Number(C.fourTwenty.runs||0)+Number(C.profibus.runs||0))*2;
  C.cableTies.runs = Number(L.basket.items||0)/2;
  C.emStopMaterial.runs = Number(C.emStopCable.runs||0);

  // C11 = SUM(C18:C22) i.e. all cable runs Aux, CY, Em Stop cable, Interface, 4-20mA
  L.panelConnecting.items = Number(C.aux.runs||0)+Number(C.cy.runs||0)+Number(C.emStopCable.runs||0)+Number(C.interfaceCable.runs||0)+Number(C.fourTwenty.runs||0);

  // C9 = (C11*0.17)*(D19/10)
  L.installCables.items = (Number(L.panelConnecting.items||0)*0.17) * (Number(C.aux.avLength||0)/10);

  const labourTotals = {};
  Object.keys(L).forEach(k=>{ labourTotals[k]=Number(L[k].items||0)*Number(L[k].timePer||0); });
  const totalTime = Object.values(labourTotals).reduce((a,b)=>a+b,0);

  const cableTotals = {};
  Object.keys(C).forEach(k=>{
    const r=C[k];
    if(r.isDirect) cableTotals[k]=Number(r.runs||0); // Additional Materials is optional value entered directly in total column/value
    else if(r.avLength===null || r.avLength===undefined) cableTotals[k]=Number(r.runs||0)*Number(r.cost||0);
    else cableTotals[k]=Number(r.runs||0)*Number(r.avLength||0)*Number(r.cost||0);
  });
  const totalCableCost = Object.values(cableTotals).reduce((a,b)=>a+b,0);

  // Labour / travel / accommodation exact links
  const totalLabourHours = totalTime*2;          // E36 = E14*2
  const totalLabourDays = totalLabourHours/12;  // E37 = E36/12
  const totalLabourDaysRounded = kensalRoundUp(totalLabourDays)+Number(d.additionalDays||0); // E38
  const dayRate = 12*Number(d.labourRate||0);   // E39 = 12*49 / labour rate
  const lodgeTotal = totalLabourDaysRounded*Number(d.lodgeRate||0); // E34 = C34*D34
  const travelQty = (totalLabourDaysRounded/5)*8; // C35 = (E38/5)*8
  const travelTotal = travelQty*Number(d.labourRate||0); // E35
  const additionalDaysTotal = Number(d.additionalDays||0)*dayRate; // E40
  const labourHotelCost = (totalLabourDaysRounded*dayRate)+lodgeTotal+travelTotal; // E41
  const totalCost = totalCableCost+labourHotelCost; // E45

  return {labourTotals,totalTime,cableTotals,totalCableCost,totalLabourHours,totalLabourDays,totalLabourDaysRounded,dayRate,lodgeTotal,travelQty,travelTotal,additionalDaysTotal,labourHotelCost,totalCost};
}

function renderKensalCosting(){
  if(!el("kensalLabourSheetRows")) return;
  const d=window.kensalSheetData, L=d.labour, C=d.cable, calc=kensalCalc();
  if(el("kensalRateLabour")) el("kensalRateLabour").value=d.labourRate;
  if(el("kensalRateLodge")) el("kensalRateLodge").value=d.lodgeRate;

  el("kensalTotalTime").textContent=Number(calc.totalTime||0).toFixed(2);

  const cableOrder=["aux","cy","emStopCable","interfaceCable","fourTwenty","profibus","stuffingGland","cableTies","emStopMaterial","additionalMaterials"];
  el("kensalCableSheetRows").innerHTML=cableOrder.map(k=>{

    return `<tr>

      <td>${r.avLength===null||r.avLength===undefined?"":`<input type="number" step="0.01" value="${r.avLength||0}" onchange="updateKensalCableSheet('${k}','avLength',this.value)">`}</td>

      <td class="calcCell">${kensalMoney(calc.cableTotals[k]||0)}</td>
    </tr>`;
  }).join("");
  el("kensalTotalCableCost").textContent=kensalMoney(calc.totalCableCost);

function ashcoBreakdownTotals(){
  try{ updateAshcoSummary(); }catch(e){}
  const rows = (typeof ashcoData !== "undefined" && ashcoData.rows) ? ashcoData.rows : [];
  const lineTotals = rows.map(ashcoLineTotals);
  const labour = lineTotals.reduce((a,x)=>a+Number(x.labourTotal||0),0);
  const materialsCost = lineTotals.reduce((a,x)=>a+Number(x.materialsCost||0),0);
  const materialsSell = lineTotals.reduce((a,x)=>a+Number(x.materialsSell||0),0);
  const lodge = lineTotals.reduce((a,x)=>a+Number(x.lodgeTotal||0),0);
  const subtotal = labour + materialsSell + lodge;
  const uplift = subtotal * (Number(ashcoData?.uplift||0)/100);
  const total = subtotal + uplift;
  return {labour, materialsCost, materialsSell, lodge, uplift, total};
}

/* PROFESSIONAL AI QUOTE REWRITE */
async function aiRewriteScopeNotes(){
  const input = el("quoteRoughScope");
  const output = el("quoteScope");

  if(!input || !output) return;

  const raw = String(input.value||"").trim();

  if(!raw){
    alert("Enter rough scope notes first.");
    return;
  }

  const cleaned = raw
    .replace(/\s+/g," ")
    .replace(/\bi will\b/gi,"")
    .replace(/\bwe will\b/gi,"")
    .trim();

  const parts = cleaned
    .split(/\.|,|\n| and /i)
    .map(x=>x.trim())
    .filter(Boolean);

  const professional = parts.map(line=>{
    let l=line;

    l=l.replace(/^install /i,"Supply and install ");
    l=l.replace(/^replace /i,"Disconnect and replace ");
    l=l.replace(/^add /i,"Provide and install ");
    l=l.replace(/^run /i,"Supply and install ");
    l=l.replace(/^fit /i,"Supply and install ");

    if(!/[.]$/.test(l)) l += ".";

    return "• " + l.charAt(0).toUpperCase() + l.slice(1);
  }).join("\\n\\n");

  output.value =
`We have made allowance to carry out the following electrical works:

${professional}

• Carry out all associated containment, wiring modifications, terminations and final connections required for a complete installation.

• Test, inspect and commission all newly installed circuits and equipment upon completion.

• All works to be carried out in accordance with current BS7671 Wiring Regulations and relevant site standards.`;

  try{renderQuotePreview()}catch(e){}
}

/* Shared live jobs table for timesheet app */
function normalizeLiveJobForTimesheets(job){
  return {
    id: String(job.id || job.jobNumber || Date.now()),
    job_number: job.jobNumber || job.job_number || job.quoteRef || "",
    job_ref: job.quoteRef || job.jobNumber || job.job_ref || "",
    customer: job.customer || "",
    site: job.site || "",
    description: job.description || job.project || "",
    status: job.status || "Live",
    order_number: job.orderNumber || job.order_number || "",
    owner: job.owner || "",
    folder_path: job.folderPath || "",
    quote_value: Number(job.quoteValue || job.quote_value || 0),
    updated_at: new Date().toISOString()
  };
}

async function upsertLiveJobToSupabase(job){
  try{
    if(typeof supabaseClient==="undefined" || !supabaseClient) return false;
    const row = normalizeLiveJobForTimesheets(job);
    const {error} = await supabaseClient.from("wge_live_jobs").upsert(row, {onConflict:"id"});
    if(error) throw error;
    return true;
  }catch(e){
    console.warn("Could not sync live job to Supabase", e);
    return false;
  }
}

async function syncAllLiveJobsToSupabase(){
  try{
    if(!Array.isArray(jobs)) return;
    for(const job of jobs.filter(j=>String(j.status||"").toLowerCase().includes("live"))){
      await upsertLiveJobToSupabase(job);
    }
  }catch(e){console.warn(e)}
}

const originalConvertStoredQuoteToJob = typeof convertStoredQuoteToJob==="function" ? convertStoredQuoteToJob : null;
async function convertStoredQuoteToJob(id){
  if(originalConvertStoredQuoteToJob){
    originalConvertStoredQuoteToJob(id);
  }
  try{
    const latest = Array.isArray(jobs) ? jobs[0] : null;
    if(latest) await upsertLiveJobToSupabase(latest);
  }catch(e){console.warn(e)}
}

const originalConvertQuoteToJob = typeof convertQuoteToJob==="function" ? convertQuoteToJob : null;
async function convertQuoteToJob(){
  if(originalConvertQuoteToJob){
    originalConvertQuoteToJob();
  }
  try{
    const latest = Array.isArray(jobs) ? jobs[0] : null;
    if(latest) await upsertLiveJobToSupabase(latest);
  }catch(e){console.warn(e)}
}

function injectAshcoSummaryIntoPriceBox(){
  if(typeof isAshcoQuote==="function" && !isAshcoQuote()) return;

  // Find the PRICE heading in the printable quote.
  const priceHeading=all.find(x=>String(x.textContent||"").trim()==="PRICE");
  if(!priceHeading) return;

  // Use the visible price section/card, not the floating total box.
  let priceBox=priceHeading.closest("section, .section, .quoteSection, .card, div") || priceHeading.parentElement;

  const old=document.getElementById("ashcoPriceRowsInsidePriceBox");
  if(old) old.remove();

  priceBox.insertAdjacentHTML("beforeend", ashcoProjectBreakdownHtml());
}

(function(){
  function showTab(tabId){
    document.querySelectorAll("section").forEach(sec=>{
      sec.classList.add("hidden");
    });

    const target = document.getElementById(tabId);
    if(target){
      target.classList.remove("hidden");
    }

    document.querySelectorAll(".tab").forEach(btn=>{
      btn.classList.remove("active");
      if(btn.dataset.tab === tabId){
        btn.classList.add("active");
      }
    });

    try{
      localStorage.setItem("wge_active_tab", tabId);
    }catch(e){}
  }

function wgeId(){ return Date.now() + Math.floor(Math.random()*100000); }
function normName(v){ return String(v||"").trim().toLowerCase(); }

function normaliseSiteContacts(site){
  if(!site) return [];
  if(!Array.isArray(site.contacts)) site.contacts = [];
  if((site.contactName || site.contactEmail) && !site.contacts.length){
    site.contacts.push({name:site.contactName||"", email:site.contactEmail||""});
  }
  return site.contacts;
}

function addOrUpdateDefaultCustomer(name, invoiceAddress, invoiceEmail, sites){
  let c = customers.find(x=>normName(x.name)===normName(name));
  if(!c){
    c = {id:wgeId(), name, invoiceAddress, invoiceEmail, notes:"Default WGE customer", sites:[]};
    customers.push(c);
  }else{
    c.invoiceAddress = invoiceAddress || c.invoiceAddress || "";
    c.invoiceEmail = invoiceEmail || c.invoiceEmail || c.email || "";
    if(!Array.isArray(c.sites)) c.sites = [];
  }
  sites.forEach(site=>{
    const siteName = typeof site === "string" ? site : site.name;
    const siteAddress = typeof site === "string" ? "" : (site.address||"");
    if(!siteName) return;
    let s = c.sites.find(x=>normName(x.name)===normName(siteName));
    if(!s){
      c.sites.push({id:wgeId(), name:siteName, address:siteAddress, contactName:"", contactEmail:"", contacts:[], notes:"Default WGE site"});
    }else if(siteAddress && !s.address){
      s.address = siteAddress;
    }
  });
}

function customerContacts(c){
  const s = quoteSiteObj();

  if(!contacts.length && s && (s.contactName || s.contactEmail)) contacts.push({name:s.contactName||"Site Contact", email:s.contactEmail||""});

  return contacts;

  const idx = Number(el("quoteContact")?.value || 0);

}

function populateQuoteContacts(){
  const c = quoteCustomerObj();

function selectedManageCustomer(){ return customerById(el("manageCustomerSelect")?.value); }

function renderSiteContactsList(){

  box.innerHTML = contacts.length ? contacts.map((c,i)=>`<div class="contactChip"><span><strong>${safe(c.name||"Unnamed")}</strong>${c.email?" — "+safe(c.email):""}</span><button class="smallDanger" onclick="removeSiteContact(${i})">Remove</button></div>`).join("") : "<p class='muted small'>No contacts saved for this site.</p>";
}

function addSiteContact(){
  const s = selectedManageSite();
  if(!s) return alert("Select a site first.");

  if(!name && !email) return alert("Enter contact name or email.");
  const contacts = normaliseSiteContacts(s);
  contacts.push({name,email});

  s.contactEmail = contacts[0]?.email || "";

function removeSiteContact(i){
  const s = selectedManageSite();
  if(!s) return;
  const contacts = normaliseSiteContacts(s);
  contacts.splice(i,1);
  s.contactName = contacts[0]?.name || "";
  s.contactEmail = contacts[0]?.email || "";
  saveAll(); renderAll();

  }).filter(n=>n>=4000);

  try{renderQuotePreview()}catch(e){}

  settings:{dayRate:588,travelRate:49,lodgeRate:125,markup:20},
  labour:[
    {description:"Motors",items:0,timePer:1.2},

};

function loadKensalCosting(){
  try{const s=localStorage.getItem("wge_kensal_costing");if(s)kensalData={...kensalData,...JSON.parse(s)}}catch(e){}
}
function saveKensalCosting(){localStorage.setItem("wge_kensal_costing",JSON.stringify(kensalData))}
function kensalLabourQty(desc){const r=kensalData.labour.find(x=>x.description===desc);return Number(r?.items||0)}
function syncKensalMaterialSuggestions(){
  kensalData.materials.forEach(m=>{
    if(m.auto==="Motors")m.runs=kensalLabourQty("Motors");
    if(m.auto==="Sensor")m.runs=kensalLabourQty("Sensor");
    if(m.auto==="E Stop/P Button")m.runs=kensalLabourQty("E Stop/P Button");
    if(m.auto==="Interface")m.runs=kensalLabourQty("Interface");
    if(m.auto==="Basket in Lengths")m.runs=kensalLabourQty("Basket in Lengths");
    if(m.auto==="glands"){
      const cableRuns = kensalData.materials.filter(x=>["Motors","Sensor","E Stop/P Button","Interface"].includes(x.auto)).reduce((a,x)=>a+Number(x.runs||0),0);
      m.runs = cableRuns*2;
    }
  });
}
function renderKensalCosting(){
  if(!el("kensalLabourRows"))return;
  if(el("kensalDayRate"))el("kensalDayRate").value=kensalData.settings.dayRate;
  if(el("kensalTravelRate"))el("kensalTravelRate").value=kensalData.settings.travelRate;
  if(el("kensalLodgeRate"))el("kensalLodgeRate").value=kensalData.settings.lodgeRate;
  if(el("kensalMarkup"))el("kensalMarkup").value=String(kensalData.settings.markup);
  if(el("kensalLodgeQty"))el("kensalLodgeQty").value=kensalData.lodgeQty;
  if(el("kensalTravelHours"))el("kensalTravelHours").value=kensalData.travelHours;
  if(el("kensalAdditionalDays"))el("kensalAdditionalDays").value=kensalData.additionalDays;
  syncKensalMaterialSuggestions();
  el("kensalLabourRows").innerHTML=kensalData.labour.map((r,i)=>`<tr><td>${safe(r.description)}</td><td><input type="number" step="1" value="${r.items}" onchange="updateKensalLabour(${i},'items',this.value)"></td><td><input type="number" step="0.01" value="${r.timePer}" onchange="updateKensalLabour(${i},'timePer',this.value)"></td><td><strong>${(Number(r.items||0)*Number(r.timePer||0)).toFixed(2)}</strong></td></tr>`).join("");
  el("kensalMaterialRows").innerHTML=kensalData.materials.map((m,i)=>{
    const cost=Number(m.runs||0)*Number(m.length||0)*Number(m.cost||0);
    const sell=cost*(1+Number(kensalData.settings.markup||0)/100);
    return `<tr><td>${safe(m.description)}</td><td><input type="number" step="0.01" value="${m.runs}" onchange="updateKensalMaterial(${i},'runs',this.value)"></td><td><input type="number" step="0.01" value="${m.length}" onchange="updateKensalMaterial(${i},'length',this.value)"></td><td><input type="number" step="0.01" value="${m.cost}" onchange="updateKensalMaterial(${i},'cost',this.value)"></td><td>${wgeMoney(cost)}</td><td><strong>${wgeMoney(sell)}</strong></td></tr>`;
  }).join("");
  updateKensalSummary();
}
function updateKensalLabour(i,k,v){kensalData.labour[i][k]=Number(v||0);renderKensalCosting()}
function updateKensalMaterial(i,k,v){kensalData.materials[i][k]=Number(v||0);updateKensalSummary();saveKensalCosting()}
function updateKensalSettings(){
  kensalData.settings.dayRate=Number(el("kensalDayRate")?.value||588);
  kensalData.settings.travelRate=Number(el("kensalTravelRate")?.value||49);
  kensalData.settings.lodgeRate=Number(el("kensalLodgeRate")?.value||125);
  kensalData.settings.markup=Number(el("kensalMarkup")?.value||20);
  kensalData.lodgeQty=Number(el("kensalLodgeQty")?.value||0);
  kensalData.travelHours=Number(el("kensalTravelHours")?.value||0);
  kensalData.additionalDays=Number(el("kensalAdditionalDays")?.value||0);
  updateKensalSummary();renderKensalCosting();
}
function updateKensalSummary(){
  const totalHours=kensalData.labour.reduce((a,r)=>a+(Number(r.items||0)*Number(r.timePer||0)),0);
  const days=totalHours/8;
  const rounded=Math.ceil(days);

function kensalMoney(v){ return "£"+Number(v||0).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function kensalRoundUp(v){ return Math.ceil(Number(v||0)); }

function kensalCalc(){
  const d=window.kensalSheetData, L=d.labour, C=d.cable;

  // EXACT spreadsheet links:
  // C19 = C6, C20 = C6, C21 = C8, C22 = C10, C25 = SUM(C19:C24)*2, C26 = C13/2, C27 = C21
  C.aux.runs = Number(L.motors.items||0);
  C.cy.runs = Number(L.motors.items||0);
  C.emStopCable.runs = Number(L.estop.items||0);
  C.interfaceCable.runs = Number(L.interface.items||0);
  C.stuffingGland.runs = (Number(C.aux.runs||0)+Number(C.cy.runs||0)+Number(C.emStopCable.runs||0)+Number(C.interfaceCable.runs||0)+Number(C.fourTwenty.runs||0)+Number(C.profibus.runs||0))*2;
  C.cableTies.runs = Number(L.basket.items||0)/2;
  C.emStopMaterial.runs = Number(C.emStopCable.runs||0);

  // C11 = SUM(C18:C22) i.e. all cable runs Aux, CY, Em Stop cable, Interface, 4-20mA
  L.panelConnecting.items = Number(C.aux.runs||0)+Number(C.cy.runs||0)+Number(C.emStopCable.runs||0)+Number(C.interfaceCable.runs||0)+Number(C.fourTwenty.runs||0);

  // C9 = (C11*0.17)*(D19/10)
  L.installCables.items = (Number(L.panelConnecting.items||0)*0.17) * (Number(C.aux.avLength||0)/10);

  const labourTotals = {};
  Object.keys(L).forEach(k=>{ labourTotals[k]=Number(L[k].items||0)*Number(L[k].timePer||0); });
  const totalTime = Object.values(labourTotals).reduce((a,b)=>a+b,0);

  const cableTotals = {};
  Object.keys(C).forEach(k=>{
    const r=C[k];
    if(r.isDirect) cableTotals[k]=Number(r.runs||0); // Additional Materials is optional value entered directly in total column/value
    else if(r.avLength===null || r.avLength===undefined) cableTotals[k]=Number(r.runs||0)*Number(r.cost||0);
    else cableTotals[k]=Number(r.runs||0)*Number(r.avLength||0)*Number(r.cost||0);
  });
  const totalCableCost = Object.values(cableTotals).reduce((a,b)=>a+b,0);

  // Labour / travel / accommodation exact links
  const totalLabourHours = totalTime*2;          // E36 = E14*2
  const totalLabourDays = totalLabourHours/12;  // E37 = E36/12
  const totalLabourDaysRounded = kensalRoundUp(totalLabourDays)+Number(d.additionalDays||0); // E38
  const dayRate = 12*Number(d.labourRate||0);   // E39 = 12*49 / labour rate
  const lodgeTotal = totalLabourDaysRounded*Number(d.lodgeRate||0); // E34 = C34*D34
  const travelQty = (totalLabourDaysRounded/5)*8; // C35 = (E38/5)*8
  const travelTotal = travelQty*Number(d.labourRate||0); // E35
  const additionalDaysTotal = Number(d.additionalDays||0)*dayRate; // E40
  const labourHotelCost = (totalLabourDaysRounded*dayRate)+lodgeTotal+travelTotal; // E41
  const totalCost = totalCableCost+labourHotelCost; // E45

  return {labourTotals,totalTime,cableTotals,totalCableCost,totalLabourHours,totalLabourDays,totalLabourDaysRounded,dayRate,lodgeTotal,travelQty,travelTotal,additionalDaysTotal,labourHotelCost,totalCost};
}

function renderKensalCosting(){
  if(!el("kensalLabourSheetRows")) return;
  const d=window.kensalSheetData, L=d.labour, C=d.cable, calc=kensalCalc();
  if(el("kensalRateLabour")) el("kensalRateLabour").value=d.labourRate;

      <td class="calcCell">${kensalMoney(calc.cableTotals[k]||0)}</td>
    </tr>`;
  }).join("");
  el("kensalTotalCableCost").textContent=kensalMoney(calc.totalCableCost);

  el("kensalLabourTravelRows").innerHTML=`

function ashcoBreakdownTotals(){
  try{ updateAshcoSummary(); }catch(e){}
  const rows = (typeof ashcoData !== "undefined" && ashcoData.rows) ? ashcoData.rows : [];
  const lineTotals = rows.map(ashcoLineTotals);
  const labour = lineTotals.reduce((a,x)=>a+Number(x.labourTotal||0),0);
  const materialsCost = lineTotals.reduce((a,x)=>a+Number(x.materialsCost||0),0);
  const materialsSell = lineTotals.reduce((a,x)=>a+Number(x.materialsSell||0),0);
  const lodge = lineTotals.reduce((a,x)=>a+Number(x.lodgeTotal||0),0);
  const subtotal = labour + materialsSell + lodge;
  const uplift = subtotal * (Number(ashcoData?.uplift||0)/100);
  const total = subtotal + uplift;
  return {labour, materialsCost, materialsSell, lodge, uplift, total};
}

/* Shared live jobs table for timesheet app */
function normalizeLiveJobForTimesheets(job){
  return {
    id: String(job.id || job.jobNumber || Date.now()),
    job_number: job.jobNumber || job.job_number || job.quoteRef || "",
    job_ref: job.quoteRef || job.jobNumber || job.job_ref || "",
    customer: job.customer || "",
    site: job.site || "",
    description: job.description || job.project || "",
    status: job.status || "Live",
    order_number: job.orderNumber || job.order_number || "",
    owner: job.owner || "",
    folder_path: job.folderPath || "",
    quote_value: Number(job.quoteValue || job.quote_value || 0),
    updated_at: new Date().toISOString()
  };
}

async function upsertLiveJobToSupabase(job){
  try{
    if(typeof supabaseClient==="undefined" || !supabaseClient) return false;
    const row = normalizeLiveJobForTimesheets(job);
    const {error} = await supabaseClient.from("wge_live_jobs").upsert(row, {onConflict:"id"});
    if(error) throw error;
    return true;
  }catch(e){
    console.warn("Could not sync live job to Supabase", e);
    return false;
  }
}

async function syncAllLiveJobsToSupabase(){
  try{
    if(!Array.isArray(jobs)) return;
    for(const job of jobs.filter(j=>String(j.status||"").toLowerCase().includes("live"))){
      await upsertLiveJobToSupabase(job);
    }
  }catch(e){console.warn(e)}
}

  const materialsCost = kd.materials.reduce((a,r)=>a+(Number(r.qty||0)*Number(r.costEach||0)),0);
  const materialsSell = materialsCost * (1 + Number(kd.markup||0)/100);
  const grand = labourTotal + cableTotal + materialsSell;
  kd.total = grand;
  if(el("kensalHoursTotal")) el("kensalHoursTotal").textContent = labourHours.toFixed(2);

function kensalMoney(v){ return "£"+Number(v||0).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function kensalRoundUp(v){ return Math.ceil(Number(v||0)); }

function kensalCalc(){
  const d=window.kensalSheetData, L=d.labour, C=d.cable;

  // EXACT spreadsheet links:
  // C19 = C6, C20 = C6, C21 = C8, C22 = C10, C25 = SUM(C19:C24)*2, C26 = C13/2, C27 = C21
  C.aux.runs = Number(L.motors.items||0);
  C.cy.runs = Number(L.motors.items||0);
  C.emStopCable.runs = Number(L.estop.items||0);
  C.interfaceCable.runs = Number(L.interface.items||0);
  C.stuffingGland.runs = (Number(C.aux.runs||0)+Number(C.cy.runs||0)+Number(C.emStopCable.runs||0)+Number(C.interfaceCable.runs||0)+Number(C.fourTwenty.runs||0)+Number(C.profibus.runs||0))*2;
  C.cableTies.runs = Number(L.basket.items||0)/2;
  C.emStopMaterial.runs = Number(C.emStopCable.runs||0);

  // C11 = SUM(C18:C22) i.e. all cable runs Aux, CY, Em Stop cable, Interface, 4-20mA
  L.panelConnecting.items = Number(C.aux.runs||0)+Number(C.cy.runs||0)+Number(C.emStopCable.runs||0)+Number(C.interfaceCable.runs||0)+Number(C.fourTwenty.runs||0);

  // C9 = (C11*0.17)*(D19/10)
  L.installCables.items = (Number(L.panelConnecting.items||0)*0.17) * (Number(C.aux.avLength||0)/10);

  const labourTotals = {};
  Object.keys(L).forEach(k=>{ labourTotals[k]=Number(L[k].items||0)*Number(L[k].timePer||0); });
  const totalTime = Object.values(labourTotals).reduce((a,b)=>a+b,0);

  const cableTotals = {};
  Object.keys(C).forEach(k=>{
    const r=C[k];
    if(r.isDirect) cableTotals[k]=Number(r.runs||0); // Additional Materials is optional value entered directly in total column/value
    else if(r.avLength===null || r.avLength===undefined) cableTotals[k]=Number(r.runs||0)*Number(r.cost||0);
    else cableTotals[k]=Number(r.runs||0)*Number(r.avLength||0)*Number(r.cost||0);
  });
  const totalCableCost = Object.values(cableTotals).reduce((a,b)=>a+b,0);

  // Labour / travel / accommodation exact links
  const totalLabourHours = totalTime*2;          // E36 = E14*2
  const totalLabourDays = totalLabourHours/12;  // E37 = E36/12
  const totalLabourDaysRounded = kensalRoundUp(totalLabourDays)+Number(d.additionalDays||0); // E38
  const dayRate = 12*Number(d.labourRate||0);   // E39 = 12*49 / labour rate
  const lodgeTotal = totalLabourDaysRounded*Number(d.lodgeRate||0); // E34 = C34*D34
  const travelQty = (totalLabourDaysRounded/5)*8; // C35 = (E38/5)*8
  const travelTotal = travelQty*Number(d.labourRate||0); // E35
  const additionalDaysTotal = Number(d.additionalDays||0)*dayRate; // E40
  const labourHotelCost = (totalLabourDaysRounded*dayRate)+lodgeTotal+travelTotal; // E41
  const totalCost = totalCableCost+labourHotelCost; // E45

  return {labourTotals,totalTime,cableTotals,totalCableCost,totalLabourHours,totalLabourDays,totalLabourDaysRounded,dayRate,lodgeTotal,travelQty,travelTotal,additionalDaysTotal,labourHotelCost,totalCost};
}

function renderKensalCosting(){
  if(!el("kensalLabourSheetRows")) return;

    </tr>`;
  }).join("");
  el("kensalTotalCableCost").textContent=kensalMoney(calc.totalCableCost);

  el("kensalLabourTravelRows").innerHTML=`
    <tr><td>Lodge</td><td class="calcCell">${calc.totalLabourDaysRounded.toFixed(2)}</td><td><input type="number" step="0.01" value="${d.lodgeRate}" onchange="updateKensalSetting('lodgeRate',this.value)"></td><td class="calcCell">${kensalMoney(calc.lodgeTotal)}</td></tr>
    <tr><td>Travel Time</td><td class="calcCell">${calc.travelQty.toFixed(2)}</td><td><input type="number" step="0.01" value="${d.labourRate}" onchange="updateKensalSetting('labourRate',this.value)"></td><td class="calcCell">${kensalMoney(calc.travelTotal)}</td></tr>
    <tr><td>Total Labour Hours</td><td></td><td></td><td class="calcCell">${calc.totalLabourHours.toFixed(2)}</td></tr>
    <tr><td>Total Labour Days</td><td></td><td></td><td class="calcCell">${calc.totalLabourDays.toFixed(2)}</td></tr>
    <tr><td>Total Labour Days Rounded Up</td><td></td><td></td><td class="calcCell">${calc.totalLabourDaysRounded.toFixed(2)}</td></tr>
    <tr><td>Day Rate</td><td></td><td></td><td class="calcCell">${kensalMoney(calc.dayRate)}</td></tr>
    <tr><td>Additional Days</td><td><input type="number" step="0.01" value="${d.additionalDays}" onchange="updateKensalSetting('additionalDays',this.value)"></td><td></td><td class="calcCell">${kensalMoney(calc.additionalDaysTotal)}</td></tr>`;
  el("kensalTotalLabourHotel").textContent=kensalMoney(calc.labourHotelCost);
  el("kensalSummaryCable").textContent=kensalMoney(calc.totalCableCost);
  el("kensalSummaryLabourHotel").textContent=kensalMoney(calc.labourHotelCost);
  el("kensalSummaryTotal").textContent=kensalMoney(calc.totalCost);
  d.total=calc.totalCost;
  saveKensalCosting();
}

function ashcoBreakdownTotals(){
  try{ updateAshcoSummary(); }catch(e){}
  const rows = (typeof ashcoData !== "undefined" && ashcoData.rows) ? ashcoData.rows : [];
  const lineTotals = rows.map(ashcoLineTotals);
  const labour = lineTotals.reduce((a,x)=>a+Number(x.labourTotal||0),0);
  const materialsCost = lineTotals.reduce((a,x)=>a+Number(x.materialsCost||0),0);
  const materialsSell = lineTotals.reduce((a,x)=>a+Number(x.materialsSell||0),0);
  const lodge = lineTotals.reduce((a,x)=>a+Number(x.lodgeTotal||0),0);
  const subtotal = labour + materialsSell + lodge;
  const uplift = subtotal * (Number(ashcoData?.uplift||0)/100);
  const total = subtotal + uplift;
  return {labour, materialsCost, materialsSell, lodge, uplift, total};
}

function saveQuoteToRegister(statusOverride){
  const q=collectQuoteStorageData(), list=loadQuoteRegister(), idx=list.findIndex(x=>x.id===q.id);

function createQuoteRevision(){

  const next=Math.max(0,...list.filter(x=>x.parentId===parentId||x.id===parentId).map(x=>Number(x.revision||0)))+1;
  const rev={...base,id:makeQuoteId(),parentId:parentId,revision:next,status:"Draft",quoteRef:String(base.quoteRef||"Quote").replace(/\s+Rev\s+\d+$/i,"")+" Rev "+next,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  list.unshift(rev);saveQuoteRegister(list);currentStoredQuoteId=rev.id;if(el("quoteRef"))el("quoteRef").value=rev.quoteRef;renderQuoteStorageList();

function downloadTextFile(filename,text,mime){const b=new Blob([text||""],{type:mime||"text/plain"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);}

/* Shared live jobs table for timesheet app */
function normalizeLiveJobForTimesheets(job){
  return {
    id: String(job.id || job.jobNumber || Date.now()),
    job_number: job.jobNumber || job.job_number || job.quoteRef || "",
    job_ref: job.quoteRef || job.jobNumber || job.job_ref || "",
    customer: job.customer || "",
    site: job.site || "",
    description: job.description || job.project || "",
    status: job.status || "Live",
    order_number: job.orderNumber || job.order_number || "",
    owner: job.owner || "",
    folder_path: job.folderPath || "",
    quote_value: Number(job.quoteValue || job.quote_value || 0),
    updated_at: new Date().toISOString()
  };
}

async function upsertLiveJobToSupabase(job){
  try{
    if(typeof supabaseClient==="undefined" || !supabaseClient) return false;
    const row = normalizeLiveJobForTimesheets(job);
    const {error} = await supabaseClient.from("wge_live_jobs").upsert(row, {onConflict:"id"});
    if(error) throw error;
    return true;
  }catch(e){
    console.warn("Could not sync live job to Supabase", e);
    return false;
  }
}

async function syncAllLiveJobsToSupabase(){
  try{
    if(!Array.isArray(jobs)) return;
    for(const job of jobs.filter(j=>String(j.status||"").toLowerCase().includes("live"))){
      await upsertLiveJobToSupabase(job);
    }
  }catch(e){console.warn(e)}
}

function kensalLabourQty(desc){const r=kensalData.labour.find(x=>x.description===desc);return Number(r?.items||0)}
function syncKensalMaterialSuggestions(){
  kensalData.materials.forEach(m=>{
    if(m.auto==="Motors")m.runs=kensalLabourQty("Motors");
    if(m.auto==="Sensor")m.runs=kensalLabourQty("Sensor");
    if(m.auto==="E Stop/P Button")m.runs=kensalLabourQty("E Stop/P Button");
    if(m.auto==="Interface")m.runs=kensalLabourQty("Interface");
    if(m.auto==="Basket in Lengths")m.runs=kensalLabourQty("Basket in Lengths");
    if(m.auto==="glands"){
      const cableRuns = kensalData.materials.filter(x=>["Motors","Sensor","E Stop/P Button","Interface"].includes(x.auto)).reduce((a,x)=>a+Number(x.runs||0),0);
      m.runs = cableRuns*2;
    }
  });

function renderKensalCosting(){
  if(!el("kensalLabourRows"))return;
  if(el("kensalDayRate"))el("kensalDayRate").value=kensalData.settings.dayRate;
  if(el("kensalTravelRate"))el("kensalTravelRate").value=kensalData.settings.travelRate;

function updateKensalSummary(){
  const totalHours=kensalData.labour.reduce((a,r)=>a+(Number(r.items||0)*Number(r.timePer||0)),0);
  const days=totalHours/8;

function kensalMoney(v){ return "£"+Number(v||0).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function kensalRoundUp(v){ return Math.ceil(Number(v||0)); }

function kensalCalc(){
  const d=window.kensalSheetData, L=d.labour, C=d.cable;

  // EXACT spreadsheet links:
  // C19 = C6, C20 = C6, C21 = C8, C22 = C10, C25 = SUM(C19:C24)*2, C26 = C13/2, C27 = C21
  C.aux.runs = Number(L.motors.items||0);
  C.cy.runs = Number(L.motors.items||0);
  C.emStopCable.runs = Number(L.estop.items||0);
  C.interfaceCable.runs = Number(L.interface.items||0);
  C.stuffingGland.runs = (Number(C.aux.runs||0)+Number(C.cy.runs||0)+Number(C.emStopCable.runs||0)+Number(C.interfaceCable.runs||0)+Number(C.fourTwenty.runs||0)+Number(C.profibus.runs||0))*2;
  C.cableTies.runs = Number(L.basket.items||0)/2;
  C.emStopMaterial.runs = Number(C.emStopCable.runs||0);

  // C11 = SUM(C18:C22) i.e. all cable runs Aux, CY, Em Stop cable, Interface, 4-20mA
  L.panelConnecting.items = Number(C.aux.runs||0)+Number(C.cy.runs||0)+Number(C.emStopCable.runs||0)+Number(C.interfaceCable.runs||0)+Number(C.fourTwenty.runs||0);

  // C9 = (C11*0.17)*(D19/10)
  L.installCables.items = (Number(L.panelConnecting.items||0)*0.17) * (Number(C.aux.avLength||0)/10);

  const labourTotals = {};
  Object.keys(L).forEach(k=>{ labourTotals[k]=Number(L[k].items||0)*Number(L[k].timePer||0); });
  const totalTime = Object.values(labourTotals).reduce((a,b)=>a+b,0);

  const cableTotals = {};
  Object.keys(C).forEach(k=>{
    const r=C[k];
    if(r.isDirect) cableTotals[k]=Number(r.runs||0); // Additional Materials is optional value entered directly in total column/value
    else if(r.avLength===null || r.avLength===undefined) cableTotals[k]=Number(r.runs||0)*Number(r.cost||0);
    else cableTotals[k]=Number(r.runs||0)*Number(r.avLength||0)*Number(r.cost||0);
  });
  const totalCableCost = Object.values(cableTotals).reduce((a,b)=>a+b,0);

  // Labour / travel / accommodation exact links
  const totalLabourHours = totalTime*2;          // E36 = E14*2
  const totalLabourDays = totalLabourHours/12;  // E37 = E36/12
  const totalLabourDaysRounded = kensalRoundUp(totalLabourDays)+Number(d.additionalDays||0); // E38
  const dayRate = 12*Number(d.labourRate||0);   // E39 = 12*49 / labour rate
  const lodgeTotal = totalLabourDaysRounded*Number(d.lodgeRate||0); // E34 = C34*D34
  const travelQty = (totalLabourDaysRounded/5)*8; // C35 = (E38/5)*8
  const travelTotal = travelQty*Number(d.labourRate||0); // E35
  const additionalDaysTotal = Number(d.additionalDays||0)*dayRate; // E40
  const labourHotelCost = (totalLabourDaysRounded*dayRate)+lodgeTotal+travelTotal; // E41
  const totalCost = totalCableCost+labourHotelCost; // E45

  return {labourTotals,totalTime,cableTotals,totalCableCost,totalLabourHours,totalLabourDays,totalLabourDaysRounded,dayRate,lodgeTotal,travelQty,travelTotal,additionalDaysTotal,labourHotelCost,totalCost};
}

function renderKensalCosting(){
  if(!el("kensalLabourSheetRows")) return;
  const d=window.kensalSheetData, L=d.labour, C=d.cable, calc=kensalCalc();

    </tr>`;
  }).join("");
  el("kensalTotalCableCost").textContent=kensalMoney(calc.totalCableCost);

  el("kensalLabourTravelRows").innerHTML=`
    <tr><td>Lodge</td><td class="calcCell">${calc.totalLabourDaysRounded.toFixed(2)}</td><td><input type="number" step="0.01" value="${d.lodgeRate}" onchange="updateKensalSetting('lodgeRate',this.value)"></td><td class="calcCell">${kensalMoney(calc.lodgeTotal)}</td></tr>

function ashcoBreakdownTotals(){
  try{ updateAshcoSummary(); }catch(e){}
  const rows = (typeof ashcoData !== "undefined" && ashcoData.rows) ? ashcoData.rows : [];
  const lineTotals = rows.map(ashcoLineTotals);
  const labour = lineTotals.reduce((a,x)=>a+Number(x.labourTotal||0),0);
  const materialsCost = lineTotals.reduce((a,x)=>a+Number(x.materialsCost||0),0);
  const materialsSell = lineTotals.reduce((a,x)=>a+Number(x.materialsSell||0),0);
  const lodge = lineTotals.reduce((a,x)=>a+Number(x.lodgeTotal||0),0);
  const subtotal = labour + materialsSell + lodge;
  const uplift = subtotal * (Number(ashcoData?.uplift||0)/100);
  const total = subtotal + uplift;
  return {labour, materialsCost, materialsSell, lodge, uplift, total};
}

function saveQuoteToRegister(statusOverride){
  const q=collectQuoteStorageData(), list=loadQuoteRegister(), idx=list.findIndex(x=>x.id===q.id);
  if(idx>=0){q.createdAt=list[idx].createdAt||q.createdAt;q.revision=list[idx].revision||0;q.parentId=list[idx].parentId||null;q.status=statusOverride||list[idx].status||"Draft";list[idx]={...list[idx],...q,updatedAt:new Date().toISOString()};}
  else{q.status=statusOverride||"Draft";list.unshift(q);currentStoredQuoteId=q.id;}
  saveQuoteRegister(list);localStorage.setItem("wge_live_job_schedule_has_been_used","1");renderQuoteStorageList();
  if(el("quoteStorageMessage"))el("quoteStorageMessage").textContent=`Saved ${q.quoteRef||"quote"} as ${q.status}.`;
  return q;
}
function loadStoredQuote(id){
  const q=loadQuoteRegister().find(x=>x.id===id); if(!q)return alert("Quote not found.");
  currentStoredQuoteId=q.id;
  [["quoteRef",q.quoteRef],["quoteProjectTitle",q.project],["quoteEnquiry",q.enquiry],["quoteRoughScope",q.roughScope],["quoteScope",q.polishedScope],["quoteAssumptions",q.assumptions],["quoteNetPrice",q.netPrice],["quoteDropboxFolder",q.folderPath],["quoteFolderPath",q.folderPath],["quoteOrderNumber",q.orderNumber],["quoteSiteAddress",q.siteAddress],["quoteEmailAddress",q.contactEmail]].forEach(([id,val])=>{if(el(id))el(id).value=val||"";});
  if(el("quoteOwnerSelect"))el("quoteOwnerSelect").value=q.owner||"Wayne Bonney";
  if(el("quotePreparedBy"))el("quotePreparedBy").value=q.owner||"";
  if(el("quoteTypeSelect"))el("quoteTypeSelect").value=q.quoteType||"standard";
  try{renderQuotePreview();}catch(e){} showTab("quoteprint");
}
function createQuoteRevision(){
  const base=saveQuoteToRegister(), list=loadQuoteRegister(), parentId=base.parentId||base.id;
  const next=Math.max(0,...list.filter(x=>x.parentId===parentId||x.id===parentId).map(x=>Number(x.revision||0)))+1;
  const rev={...base,id:makeQuoteId(),parentId:parentId,revision:next,status:"Draft",quoteRef:String(base.quoteRef||"Quote").replace(/\s+Rev\s+\d+$/i,"")+" Rev "+next,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  list.unshift(rev);saveQuoteRegister(list);currentStoredQuoteId=rev.id;if(el("quoteRef"))el("quoteRef").value=rev.quoteRef;renderQuoteStorageList();
}
function deleteStoredQuote(id){if(!confirm("Delete this saved quote?"))return;saveQuoteRegister(loadQuoteRegister().filter(x=>x.id!==id));renderQuoteStorageList();}
function setStoredQuoteStatus(status){return saveQuoteToRegister(status);}
function convertStoredQuoteToJob(id){
  const q=loadQuoteRegister().find(x=>x.id===id)||saveQuoteToRegister("Accepted");
  const order=q.orderNumber||el("quoteOrderNumber")?.value||prompt("Enter order / PO number:"); if(!order)return;
  const job={id:Date.now(),jobNumber:q.quoteRef,quoteRef:q.quoteRef,owner:q.owner,customer:q.customer,site:q.site,description:q.project||q.enquiry||"Job from quote",status:"Live",quoteValue:Number(q.netPrice||0),orderNumber:order,folderPath:q.folderPath||"",createdAt:new Date().toISOString()};
  try{if(!Array.isArray(jobs))jobs=[];jobs.unshift(job);}catch(e){}
  const list=loadQuoteRegister(), idx=list.findIndex(x=>x.id===q.id); if(idx>=0){list[idx].status="Live Job";list[idx].orderNumber=order;list[idx].convertedJobNumber=job.jobNumber;saveQuoteRegister(list);}
  try{saveAll();}catch(e){} renderQuoteStorageList(); alert("Quote converted to live job.");
}
function downloadTextFile(filename,text,mime){const b=new Blob([text||""],{type:mime||"text/plain"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);}
function exportQuotePack(id){
  const q=id?loadQuoteRegister().find(x=>x.id===id):saveQuoteToRegister(); if(!q)return alert("Save a quote first.");
  const safeRef=String(q.quoteRef||"WGE_Quote").replace(/[^\w\-]+/g,"_");
  downloadTextFile(`${safeRef}_QUOTE_PACK.json`,JSON.stringify({read_me:"Save these files into the relevant Dropbox job folder.",quote:q},null,2),"application/json");
  downloadTextFile(`${safeRef}_QUOTE.html`,q.quoteHtml||quoteHtmlSnapshot(),"text/html");
  if(q.ashcoBreakdown){const csv=["Section,Amount",`Labour,${q.ashcoBreakdown.labour||0}`,`Materials,${q.ashcoBreakdown.materialsSell||0}`,`Lodge,${q.ashcoBreakdown.lodge||0}`,`Total,${q.ashcoBreakdown.total||0}`].join("\\n");downloadTextFile(`${safeRef}_ASHCO_COSTING.csv`,csv,"text/csv");}
  if(el("quoteStorageMessage"))el("quoteStorageMessage").textContent=`Quote pack downloaded. Save into Dropbox folder: ${q.folderPath||"your job folder"}.`;
}
function renderQuoteStorageList(){
  const box=el("quoteStorageList"); if(!box)return;
  const term=String(el("quoteRegisterSearch")?.value||"").toLowerCase(), status=el("quoteRegisterStatus")?.value||"";
  const list=loadQuoteRegister().filter(q=>{const hay=[q.quoteRef,q.customer,q.site,q.project,q.owner,q.status].join(" ").toLowerCase();return(!term||hay.includes(term))&&(!status||q.status===status);});
  box.innerHTML=list.length?list.map(q=>`<div class="quoteStorageItem"><div><strong>${safe(q.quoteRef||"Quote")} ${q.revision?`Rev ${q.revision}`:""} <span class="quoteStatusBadge">${safe(q.status||"Draft")}</span></strong><small>${safe(q.customer||"")} — ${safe(q.site||"")} — ${safe(q.project||"")}<br>${safe(q.owner||"")} / Net ${moneyFmt(q.netPrice||0)} / Updated ${q.updatedAt?new Date(q.updatedAt).toLocaleString("en-GB"):""}<br>Folder: ${safe(q.folderPath||"Not linked")}</small></div><div class="quoteActionRow"><button class="btn2" onclick="loadStoredQuote('${q.id}')">Open</button><button class="btn2" onclick="exportQuotePack('${q.id}')">Quote Pack</button><button class="btnGreen" onclick="convertStoredQuoteToJob('${q.id}')">To Job</button><button class="btnRed" onclick="deleteStoredQuote('${q.id}')">Delete</button></div></div>`).join(""):`<p class="muted small" style="padding:12px">No saved quotes yet.</p>`;
}
function wireQuoteStorageButtons(){
  if(el("saveQuoteRegisterBtn"))el("saveQuoteRegisterBtn").onclick=()=>saveQuoteToRegister();
  if(el("saveQuotePackBtn"))el("saveQuotePackBtn").onclick=()=>exportQuotePack();
  if(el("createRevisionBtn"))el("createRevisionBtn").onclick=()=>createQuoteRevision();
  if(el("markAcceptedBtn"))el("markAcceptedBtn").onclick=()=>setStoredQuoteStatus("Accepted");
  if(el("markLostBtn"))el("markLostBtn").onclick=()=>setStoredQuoteStatus("Lost");
  if(el("quoteRegisterSearch"))el("quoteRegisterSearch").oninput=renderQuoteStorageList;
  if(el("quoteRegisterStatus"))el("quoteRegisterStatus").onchange=renderQuoteStorageList;
}

/* Shared live jobs table for timesheet app */
function normalizeLiveJobForTimesheets(job){
  return {
    id: String(job.id || job.jobNumber || Date.now()),
    job_number: job.jobNumber || job.job_number || job.quoteRef || "",
    job_ref: job.quoteRef || job.jobNumber || job.job_ref || "",
    customer: job.customer || "",
    site: job.site || "",
    description: job.description || job.project || "",
    status: job.status || "Live",
    order_number: job.orderNumber || job.order_number || "",
    owner: job.owner || "",
    folder_path: job.folderPath || "",
    quote_value: Number(job.quoteValue || job.quote_value || 0),
    updated_at: new Date().toISOString()
  };
}

async function upsertLiveJobToSupabase(job){
  try{
    if(typeof supabaseClient==="undefined" || !supabaseClient) return false;
    const row = normalizeLiveJobForTimesheets(job);
    const {error} = await supabaseClient.from("wge_live_jobs").upsert(row, {onConflict:"id"});
    if(error) throw error;
    return true;
  }catch(e){
    console.warn("Could not sync live job to Supabase", e);
    return false;
  }
}

async function syncAllLiveJobsToSupabase(){
  try{
    if(!Array.isArray(jobs)) return;
    for(const job of jobs.filter(j=>String(j.status||"").toLowerCase().includes("live"))){
      await upsertLiveJobToSupabase(job);
    }
  }catch(e){console.warn(e)}
}

const originalConvertStoredQuoteToJob = typeof convertStoredQuoteToJob==="function" ? convertStoredQuoteToJob : null;
async function convertStoredQuoteToJob(id){
  if(originalConvertStoredQuoteToJob){
    originalConvertStoredQuoteToJob(id);
  }
  try{
    const latest = Array.isArray(jobs) ? jobs[0] : null;
    if(latest) await upsertLiveJobToSupabase(latest);
  }catch(e){console.warn(e)}
}

const originalConvertQuoteToJob = typeof convertQuoteToJob==="function" ? convertQuoteToJob : null;
async function convertQuoteToJob(){
  if(originalConvertQuoteToJob){
    originalConvertQuoteToJob();
  }
  try{
    const latest = Array.isArray(jobs) ? jobs[0] : null;
    if(latest) await upsertLiveJobToSupabase(latest);
  }catch(e){console.warn(e)}
}

function ashcoProjectBreakdownHtml(){

    <div class="priceLine projectTotalLine"><span>Total Project</span><strong>${formatCurrency(t.total)}</strong></div>
  </div>`;
}

function injectAshcoSummaryIntoPriceBox(){
  if(typeof isAshcoQuote==="function" && !isAshcoQuote()) return;

  const all=[...document.querySelectorAll("*")];

  // Find the PRICE heading in the printable quote.
  const priceHeading=all.find(x=>String(x.textContent||"").trim()==="PRICE");
  if(!priceHeading) return;

  // Use the visible price section/card, not the floating total box.
  let priceBox=priceHeading.closest("section, .section, .quoteSection, .card, div") || priceHeading.parentElement;
  if(!priceBox) return;

  const old=document.getElementById("ashcoPriceRowsInsidePriceBox");
  if(old) old.remove();

  priceBox.insertAdjacentHTML("beforeend", ashcoProjectBreakdownHtml());
}

function updateAshcoQuoteBreakdownFields(){
  if(typeof ensureAshcoAddress==="function") ensureAshcoAddress();

  const t = ashcoBreakdownTotals ? ashcoBreakdownTotals() : {total:0};
